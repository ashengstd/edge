tun:
  enable: false
  stack: system
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
    - any:1053
    - tcp://any:1053
  loopback-address:
    - 10.7.0.1

ipv6: false
log-level: info
mixed-port: 7897
allow-lan: true
unified-delay: true
tcp-concurrent: true

external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
secret: "edge-default"
external-ui: ./ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

proxy-providers:
  Airport:
    type: http
    url: "http://sub.com"
    path: ./providers/airport.yaml
    interval: 3600
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      lazy: true
    header:
      User-Agent:
        - "clash.meta"


proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [DIRECT, REJECT, 🔗 节点链, ⚡ Airport 自动选择, Airport]

  # 节点链：使用策略组级别的 dialer-proxy，无需复制节点
  - name: 🔗 节点链
    type: select
    proxies: [🏮 入口节点]

  - name: 🏮 入口节点
    type: select
    dialer-proxy: 🛫 出口节点
    proxies: [DIRECT, ⚡ Airport 自动选择, Airport]

  - name: 🛫 出口节点
    type: select
    include-all-proxies: true
    proxies: [DIRECT, ⚡ Airport 自动选择, Airport]


  - name: Airport
    type: select
    use: [Airport]
  - name: ⚡ Airport 自动选择
    type: url-test
    use: [Airport]
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: false

  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT, 🚀 节点选择, ⚡ Airport 自动选择]

  - name: 💬 AI 服务
    type: select
    proxies: [🚀 节点选择, DIRECT, REJECT, ⚡ Airport 自动选择]
    include-all-proxies: true
    use: [Airport]

  - name: 📹 油管视频

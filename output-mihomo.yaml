mode: rule
find-process-mode: strict

dns:
  enable: true
  listen: "127.0.0.1:1053"
  use-system-hosts: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - 223.5.5.5
  nameserver-policy:
    "rule-set:openai,anthropic,google-gemini,deepseek,perplexity,category-dev": ["https://8.8.8.8/dns-query", "8.8.8.8"]
    "rule-set:geolocation-!cn": ["https://8.8.8.8/dns-query", "8.8.8.8"]
    "rule-set:geolocation-cn,cn": ["https://dns.alidns.com/dns-query", "223.5.5.5"]
  fallback:
    - 8.8.8.8
    - 114.114.114.114
  fallback-filter:
    geoip: true
    ipcidr: [240.0.0.0/4, 0.0.0.0/32, 127.0.0.1/32]
    domain:
      - +.google.com
      - +.facebook.com
      - +.twitter.com
      - +.youtube.com
      - +.google.cn
      - +.googleapis.cn
      - +.googleapis.com
